<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIAI Digital Bookshelf</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a5c1a;
    --green-light: #e8f4e8;
    --green-dark: #144414;
    --blue: #2563eb;
    --red-badge: #c8102e;
    --surface: #f5f5f5;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --text-muted: #666;
    --border: #e0e0e0;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--green);
    color: #fff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .topbar-logo { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .topbar-logo span { font-size: 22px; }
  .topbar-sub { font-size: 12px; opacity: .75; }
  .topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .topbar input {
    padding: 7px 12px; border: none; border-radius: var(--radius);
    font-size: 13px; width: 220px; background: rgba(255,255,255,.15);
    color: #fff; outline: none;
  }
  .topbar input::placeholder { color: rgba(255,255,255,.6); }
  .topbar input:focus { background: rgba(255,255,255,.25); }
  .btn-add {
    padding: 7px 14px; background: #fff; color: var(--green);
    border: none; border-radius: var(--radius); font-size: 13px;
    font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px;
  }
  .btn-add:hover { background: #e8f4e8; }

  /* ── Filter bar ── */
  .filterbar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filterbar label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .filterbar select {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 13px; background: #fff; cursor: pointer; color: var(--text);
  }
  .pill {
    padding: 5px 14px; font-size: 12px; border: 1px solid var(--border);
    border-radius: 20px; background: #fff; cursor: pointer; color: var(--text-muted);
    transition: all .15s; white-space: nowrap;
  }
  .pill.on { background: var(--green); color: #fff; border-color: var(--green); }
  .source-pills { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ── Main ── */
  .main { padding: 20px 24px; }
  .stats-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
  }
  .stats-bar .count { font-size: 13px; color: var(--text-muted); }
  .refresh-btn {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 12px; background: #fff; cursor: pointer; color: var(--text-muted);
    display: flex; align-items: center; gap: 5px;
  }
  .refresh-btn:hover { border-color: var(--green); color: var(--green); }

  /* ── Book grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 16px;
  }
  .book-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color .15s, transform .15s;
  }
  .book-card:hover { border-color: var(--green); transform: translateY(-2px); }
  .cover-wrap {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    cursor: pointer;
  }
  .cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; padding: 12px; text-align: center;
  }
  .cover-placeholder .icon { font-size: 36px; opacity: .5; }
  .cover-placeholder .ptitle {
    font-size: 11px; font-weight: 600; line-height: 1.3;
    color: inherit; opacity: .85;
  }
  .matatag-badge {
    position: absolute; top: 6px; left: 6px;
    background: var(--red-badge); color: #fff;
    font-size: 8px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; letter-spacing: .5px;
  }
  .source-dot {
    position: absolute; top: 6px; right: 6px;
    font-size: 9px; background: rgba(0,0,0,.5); color: #fff;
    padding: 2px 6px; border-radius: 10px;
  }
  .book-info {
    padding: 10px 10px 4px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .book-title {
    font-size: 12px; font-weight: 600; line-height: 1.35; color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .book-author { font-size: 11px; color: var(--text-muted); }
  .subject-tag { font-size: 10px; font-weight: 600; color: var(--green); margin-top: 2px; }
  .grade-tag { font-size: 10px; color: var(--text-muted); }
  .progress-wrap { margin-top: 6px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--text-muted); margin-bottom: 3px;
  }
  .progress-bar { height: 3px; background: #eee; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; }
  .date-row { font-size: 10px; color: var(--text-muted); margin-top: 4px; line-height: 1.6; }
  .read-btn {
    margin: 8px 10px 10px;
    padding: 7px; background: var(--blue); color: #fff;
    border: none; border-radius: var(--radius);
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: background .15s;
  }
  .read-btn:hover { background: #1d4ed8; }

  /* ── States ── */
  .loading, .empty, .error {
    grid-column: 1/-1; text-align: center;
    padding: 4rem 1rem; color: var(--text-muted);
  }
  .loading .spinner {
    width: 32px; height: 32px; border: 3px solid #eee;
    border-top-color: var(--green); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty .icon, .error .icon { font-size: 40px; display: block; margin-bottom: 10px; opacity: .3; }

  /* ── Modal (add book) ── */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.55); z-index: 300;
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; padding: 1.5rem;
    max-width: 480px; width: 92%; max-height: 88vh; overflow-y: auto;
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .mh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .close-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-muted); }
  .fg { margin-bottom: 10px; }
  .fg label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
  .fg input, .fg select, .fg textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 13px; color: var(--text);
    font-family: inherit;
  }
  .fg textarea { resize: vertical; min-height: 60px; }
  .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .submit-btn {
    width: 100%; padding: 10px; background: var(--green); color: #fff;
    border: none; border-radius: var(--radius); font-size: 14px;
    font-weight: 600; cursor: pointer; margin-top: 6px;
  }
  .submit-btn:hover { background: var(--green-dark); }
  .ferr { font-size: 12px; color: #c8102e; margin-top: 6px; }

  /* ── Viewer modal ── */
  .viewer-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.8); z-index: 400;
    flex-direction: column;
  }
  .viewer-bg.open { display: flex; }
  .viewer-topbar {
    background: #1a1a1a; color: #fff;
    padding: 10px 16px; display: flex; align-items: center; gap: 10px;
  }
  .viewer-topbar .vtitle { font-size: 13px; font-weight: 500; flex: 1; }
  .vbtn {
    padding: 6px 12px; border-radius: var(--radius); font-size: 12px;
    border: none; cursor: pointer; font-weight: 500;
  }
  .vbtn-open { background: var(--blue); color: #fff; }
  .vbtn-close { background: #444; color: #fff; }
  .viewer-frame { flex: 1; border: none; background: #222; }
</style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <div>
    <div class="topbar-logo">📚 NIAI Digital Bookshelf</div>
    <div class="topbar-sub">Nazareth Institute of Alfonso, Inc. — MATATAG Learning Resources</div>
  </div>
  <div class="topbar-right">
    <input type="text" id="q" placeholder="Search title, subject…" oninput="applyFilters()">
    <button class="btn-add" onclick="openAddModal()">+ Add book</button>
  </div>
</div>

<!-- ── Filter bar ── -->
<div class="filterbar">
  <label>Level:</label>
  <select id="gf" onchange="applyFilters()">
    <option value="">All grades</option>
    <option>Kinder</option>
    <option>Grade 1</option><option>Grade 2</option><option>Grade 3</option>
    <option>Grade 4</option><option>Grade 5</option><option>Grade 6</option>
    <option>Grade 7</option><option>Grade 8</option><option>Grade 9</option><option>Grade 10</option>
    <option>Grade 11</option><option>Grade 12</option>
  </select>

  <label>Subject:</label>
  <div class="source-pills" id="subj-pills"></div>

  <label style="margin-left:8px">Source:</label>
  <div class="source-pills" id="source-pills"></div>
</div>

<!-- ── Main ── -->
<div class="main">
  <div class="stats-bar">
    <span class="count" id="count-label">Loading…</span>
    <button class="refresh-btn" onclick="fetchBooks(true)">↻ Refresh from web</button>
  </div>
  <div class="grid" id="grid">
    <div class="loading">
      <div class="spinner"></div>
      <div>Fetching resources from DepEd sites…</div>
    </div>
  </div>
</div>

<!-- ── Add book modal ── -->
<div class="modal-bg" id="add-modal" onclick="bgClose(event,'add-modal')">
  <div class="modal">
    <div class="mh">
      <h3>Add a resource manually</h3>
      <button class="close-btn" onclick="closeModal('add-modal')">✕</button>
    </div>
    <div class="frow">
      <div class="fg" style="grid-column:1/-1">
        <label>Title</label>
        <input id="fa-title" placeholder="(MATATAG) Book or module title">
      </div>
    </div>
    <div class="frow">
      <div class="fg"><label>Author</label><input id="fa-author" placeholder="Full name"></div>
      <div class="fg"><label>Subject</label><input id="fa-sub" placeholder="e.g. Mathematics"></div>
    </div>
    <div class="frow">
      <div class="fg">
        <label>Grade level</label>
        <select id="fa-grade">
          <option>Kinder</option><option>Grade 1</option><option>Grade 2</option>
          <option>Grade 3</option><option>Grade 4</option><option>Grade 5</option>
          <option>Grade 6</option><option>Grade 7</option><option selected>Grade 8</option>
          <option>Grade 9</option><option>Grade 10</option><option>Grade 11</option><option>Grade 12</option>
        </select>
      </div>
      <div class="fg"><label>Cover image URL (optional)</label><input id="fa-cover" placeholder="https://…"></div>
    </div>
    <div class="fg"><label>Resource link</label><input id="fa-url" placeholder="Google Drive / PDF / DepEd portal URL"></div>
    <div id="fa-err" class="ferr"></div>
    <button class="submit-btn" onclick="submitAdd()">Add book</button>
  </div>
</div>

<!-- ── Inline viewer modal ── -->
<div class="viewer-bg" id="viewer-modal">
  <div class="viewer-topbar">
    <span class="vtitle" id="v-title">—</span>
    <button class="vbtn vbtn-open" onclick="openExternal()">Open in new tab ↗</button>
    <button class="vbtn vbtn-close" onclick="closeViewer()">✕ Close</button>
  </div>
  <iframe class="viewer-frame" id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// IMPORTANT: Replace this with your actual Render URL after deploying
const API = localStorage.getItem('niai_api_url') || 'https://niai-lms.onrender.com';

const SUBJ_COLORS = {
  'Mathematics': '#1a5c1a', 'English': '#185fa5', 'Filipino': '#8b1a1a',
  'Science': '#5c3d1a', 'Araling Panlipunan': '#4a1a5c', 'EPP/TLE': '#1a4a5c',
  'Computer Studies': '#1a5c3a', 'MAPEH': '#7c1a5c', 'EsP': '#5c1a1a',
  'Curriculum Guide': '#3a3a1a', 'General': '#444',
};

// ── State ─────────────────────────────────────────────────────────────────────
let allBooks = [];
let localBooks = JSON.parse(localStorage.getItem('niai_local_books') || '[]');
let activeSubj = '', activeSource = '';
let currentViewUrl = '';

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function fetchBooks(forceRefresh = false) {
  document.getElementById('grid').innerHTML =
    '<div class="loading"><div class="spinner"></div><div>Fetching resources from DepEd sites…</div></div>';

  try {
    const res = await fetch(`${API}/api/books`);
    if (!res.ok) throw new Error(`API responded ${res.status}`);
    const data = await res.json();
    allBooks = [...localBooks, ...data.books];
  } catch (err) {
    console.warn('API fetch failed, using local only:', err.message);
    allBooks = [...localBooks];
    if (!allBooks.length) {
      document.getElementById('grid').innerHTML =
        `<div class="error"><span class="icon">⚠️</span>
        Could not reach the API. Make sure your backend is deployed on Render.<br>
        <small style="margin-top:6px;display:block">Expected: <code>${API}</code></small>
        <button onclick="promptApiUrl()" style="margin-top:10px;padding:6px 14px;border:1px solid #ccc;border-radius:6px;cursor:pointer;font-size:12px">Set API URL</button>
        </div>`;
      document.getElementById('count-label').textContent = '0 books';
      return;
    }
  }

  buildPills();
  applyFilters();
}

// ── Filters ───────────────────────────────────────────────────────────────────
function buildPills() {
  const subjects = ['All', ...new Set(allBooks.map(b => b.subject)).values()].sort((a,b) => a==='All'?-1:b==='All'?1:a.localeCompare(b));
  const sources  = ['All', ...new Set(allBooks.map(b => b.source || 'Manual')).values()];

  document.getElementById('subj-pills').innerHTML = subjects.map(s =>
    `<button class="pill${(!activeSubj&&s==='All')||(s===activeSubj)?' on':''}" onclick="setSubj('${s}')">${s}</button>`
  ).join('');

  document.getElementById('source-pills').innerHTML = sources.map(s =>
    `<button class="pill${(!activeSource&&s==='All')||(s===activeSource)?' on':''}" onclick="setSrc('${s}')">${s}</button>`
  ).join('');
}

function setSubj(s) { activeSubj = s==='All'?'':s; buildPills(); applyFilters(); }
function setSrc(s)  { activeSource = s==='All'?'':s; buildPills(); applyFilters(); }

function applyFilters() {
  const q  = document.getElementById('q').value.toLowerCase();
  const gf = document.getElementById('gf').value;

  const list = allBooks.filter(b => {
    const mq = !q || b.title.toLowerCase().includes(q) || (b.subject||'').toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q);
    const mg = !gf || (b.grade||'').toLowerCase().includes(gf.toLowerCase());
    const ms = !activeSubj || b.subject === activeSubj;
    const msr = !activeSource || (b.source||'Manual') === activeSource;
    return mq && mg && ms && msr;
  });

  document.getElementById('count-label').textContent =
    `${list.length} book${list.length!==1?'s':''} found`;
  renderGrid(list);
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderGrid(list) {
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty"><span class="icon">📭</span><div>No books found</div><div style="font-size:12px;margin-top:4px">Try a different filter or add one manually</div></div>';
    return;
  }

  grid.innerHTML = list.map(b => {
    const col = SUBJ_COLORS[b.subject] || SUBJ_COLORS['General'];
    const src = b.source || 'Manual';
    const coverHtml = b.cover
      ? `<img src="${b.cover}" alt="${b.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const phStyle = b.cover ? 'style="display:none"' : '';

    return `<div class="book-card">
      <div class="cover-wrap" onclick="readBook('${encodeURIComponent(b.url)}','${b.title.replace(/'/g,"\\'")}')">
        ${coverHtml}
        <div class="cover-placeholder" ${phStyle} style="background:${col}22;color:${col}">
          <div class="icon">📖</div>
          <div class="ptitle">${b.title.replace(/\(MATATAG\)\s*/i,'')}</div>
        </div>
        <span class="matatag-badge">MATATAG</span>
        <span class="source-dot">${src}</span>
      </div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        ${b.author ? `<div class="book-author">Author: ${b.author}</div>` : ''}
        <div class="subject-tag">${b.subject}</div>
        <div class="grade-tag">${b.grade}</div>
        <div class="progress-wrap">
          <div class="progress-label"><span>Progress</span><span>${b.progress||0}%</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${b.progress||0}%"></div></div>
        </div>
        <div class="date-row">Start Read Date:<br>Last Read Date:</div>
      </div>
      <button class="read-btn" onclick="readBook('${encodeURIComponent(b.url)}','${b.title.replace(/'/g,"\\'")}')">Read</button>
    </div>`;
  }).join('');
}

// ── Viewer ────────────────────────────────────────────────────────────────────
function readBook(encodedUrl, title) {
  const url = decodeURIComponent(encodedUrl);
  currentViewUrl = url;

  // Convert Google Drive share links to embed links
  let embedUrl = url;
  const driveMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (driveMatch) {
    embedUrl = `https://drive.google.com/file/d/${driveMatch[1]}/preview`;
  }

  document.getElementById('v-title').textContent = title;
  document.getElementById('v-frame').src = embedUrl;
  document.getElementById('viewer-modal').classList.add('open');
}

function openExternal() { window.open(currentViewUrl, '_blank'); }
function closeViewer() {
  document.getElementById('viewer-modal').classList.remove('open');
  document.getElementById('v-frame').src = '';
}

// ── Add book ──────────────────────────────────────────────────────────────────
function openAddModal() { document.getElementById('add-modal').classList.add('open'); }

function submitAdd() {
  const title = document.getElementById('fa-title').value.trim();
  const sub   = document.getElementById('fa-sub').value.trim();
  const url   = document.getElementById('fa-url').value.trim();
  const err   = document.getElementById('fa-err');
  if (!title || !sub || !url) { err.textContent = 'Please fill in title, subject, and link.'; return; }

  const newBook = {
    id: `local-${Date.now()}`,
    title, subject: sub,
    author: document.getElementById('fa-author').value.trim(),
    grade: document.getElementById('fa-grade').value,
    cover: document.getElementById('fa-cover').value.trim(),
    url, source: 'Manual', progress: 0,
  };

  localBooks.unshift(newBook);
  localStorage.setItem('niai_local_books', JSON.stringify(localBooks));
  allBooks = [...localBooks, ...allBooks.filter(b => b.source !== 'Manual')];
  buildPills(); applyFilters();
  closeModal('add-modal');
  ['fa-title','fa-author','fa-sub','fa-cover','fa-url'].forEach(id => document.getElementById(id).value = '');
  err.textContent = '';
}

// ── Misc ──────────────────────────────────────────────────────────────────────
function bgClose(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function promptApiUrl() {
  const url = prompt('Enter your Render API URL (e.g. https://niai-lms-api.onrender.com):');
  if (url) { localStorage.setItem('niai_api_url', url.trim()); location.reload(); }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
fetchBooks();
</script>
</body>
</html>
